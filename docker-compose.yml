services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: InvestmentHelper
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d InvestmentHelper"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      database:
        condition: service_healthy
    environment:
      SECRET_KEY: dev-secret-key
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: InvestmentHelper
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8000:8000"
